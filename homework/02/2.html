<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饗宴評論 - 用餐體驗調查</title>
    <style>
        :root {
            --brand-orange: #e67e22;
            --brand-red: #d35400;
            --bg-cream: #fdfaf6;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-cream);
            background-image: radial-gradient(#e67e2222 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .survey-card {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 8px solid var(--brand-orange);
        }

        .header {
            padding: 30px;
            text-align: center;
            background: #fff;
        }

        .header h1 { margin: 0; color: var(--brand-red); font-size: 24px; }
        .header p { color: #7f8c8d; margin-top: 10px; }

        form { padding: 0 30px 30px; }

        .section-title {
            border-left: 4px solid var(--brand-orange);
            padding-left: 10px;
            margin: 25px 0 15px;
            font-weight: bold;
            color: var(--brand-red);
        }

        .input-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 500; }

        /* 輸入框樣式 */
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--brand-orange); outline: none; box-shadow: 0 0 5px rgba(230,126,34,0.2); }

        /* 評分星星樣式 (簡化版) */
        .rating-container {
            display: flex;
            justify-content: space-between;
            background: #fff9f4;
            padding: 15px;
            border-radius: 10px;
        }

        .rating-item { text-align: center; flex: 1; }

        /* 按鈕樣式 */
        .submit-btn {
            background: var(--brand-orange);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover { background: var(--brand-red); transform: scale(1.02); }

        /* 標籤雲樣式 */
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-tag {
            background: #eee;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + .checkbox-tag {
            background: var(--brand-orange);
            color: white;
        }
    </style>
</head>
<body>

<div class="survey-card">
    <div class="header">
        <h1>🍽️ 用餐體驗滿意度調查</h1>
        <p>感謝您的光臨，您的回饋是我們進步的動力。</p>
    </div>

    <form>
        <div class="section-title">基本資訊</div>
        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>用餐日期</label>
                <input type="date" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>用餐時段</label>
                <select>
                    <option>午餐</option>
                    <option>下午茶</option>
                    <option>晚餐</option>
                </select>
            </div>
        </div>

        <div class="section-title">各項評分</div>
        <div class="input-group">
            <label>1. 餐點口味滿意度 (1-5分)</label>
            <div class="rating-container">
                <label><input type="radio" name="food" value="1"> 1</label>
                <label><input type="radio" name="food" value="2"> 2</label>
                <label><input type="radio" name="food" value="3" checked> 3</label>
                <label><input type="radio" name="food" value="4"> 4</label>
                <label><input type="radio" name="food" value="5"> 5</label>
            </div>
        </div>

        <div class="input-group">
            <label>2. 服務人員態度</label>
            <div class="rating-container">
                <label><input type="radio" name="service" value="1"> 差</label>
                <label><input type="radio" name="service" value="2"> 普通</label>
                <label><input type="radio" name="service" value="3" checked> 良好</label>
                <label><input type="radio" name="service" value="4"> 優異</label>
            </div>
        </div>

        <div class="section-title">值得推薦的部分</div>
        <div class="checkbox-group">
            <label><input type="checkbox" name="fav" value="1"><span class="checkbox-tag">食材新鮮</span></label>
            <label><input type="checkbox" name="fav" value="2"><span class="checkbox-tag">擺盤精緻</span></label>
            <label><input type="checkbox" name="fav" value="3"><span class="checkbox-tag">上菜快速</span></label>
            <label><input type="checkbox" name="fav" value="4"><span class="checkbox-tag">環境整潔</span></label>
            <label><input type="checkbox" name="fav" value="5"><span class="checkbox-tag">CP值高</span></label>
        </div>

        <div class="section-title">建議與評論</div>
        <div class="input-group">
            <textarea rows="4" placeholder="請告訴我們哪些地方可以做得更好..."></textarea>
        </div>

        <button type="submit" class="submit-btn">提交回饋，領取優惠券 🎁</button>
    </form>
</div>

</body>
</html>
